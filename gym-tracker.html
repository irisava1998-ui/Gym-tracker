<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mesociclo 9 — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0edf8;
    --surface: #faf9fd;
    --surface2: #e8e4f4;
    --border: #dcd7ee;
    --accent: #9b87d4;
    --accent-soft: #c4b8ea;
    --accent2: #e8a4b8;
    --text: #2e2a40;
    --muted: #9a94b4;
    --success: #7bc4a4;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }

  /* HEADER */
  header {
    padding: 16px 18px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(155,135,212,0.08);
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .logo { font-size: 20px; font-weight: 800; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .week-badge {
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
    padding: 5px 13px; border-radius: 20px;
  }
  .week-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600; }

  /* WEEK SELECTOR */
  .week-row { display: flex; align-items: center; gap: 8px; }
  .week-nav {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--accent); font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all .15s; font-family: 'Nunito', sans-serif;
  }
  .week-nav:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-scroll { flex: 1; overflow-x: auto; scrollbar-width: none; display: flex; gap: 4px; padding: 2px 0; }
  .week-scroll::-webkit-scrollbar { display: none; }
  .week-btn {
    flex-shrink: 0; width: 34px; height: 30px; border-radius: 10px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); font-family: 'Nunito', sans-serif; transition: all .2s;
  }
  .week-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-btn.same-micro { background: var(--surface2); border-color: var(--accent-soft); color: var(--accent); }

  /* DAY TABS */
  .day-tabs {
    display: flex; gap: 6px; padding: 10px 14px;
    overflow-x: auto; flex-shrink: 0; background: var(--bg);
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 8px 18px; border-radius: 30px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); transition: all .2s; font-family: 'Nunito', sans-serif;
  }
  .day-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* MAIN */
  main { flex: 1; overflow-y: auto; padding: 10px 14px 110px; }

  /* EXERCISE CARD */
  .exercise-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .exercise-card.has-data { border-color: var(--accent-soft); box-shadow: 0 2px 12px rgba(155,135,212,0.12); }
  .ex-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 14px; cursor: pointer; user-select: none;
  }
  .ex-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .ex-note { font-size: 11px; color: var(--muted); margin-top: 2px; font-style: italic; }
  .ex-reps { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 3px; }
  .ex-last { font-size: 11px; color: var(--success); font-weight: 700; margin-top: 2px; }
  .ex-chevron {
    width: 28px; height: 28px; border-radius: 50%; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; transition: all .2s; margin-left: 8px; flex-shrink: 0;
  }
  .ex-chevron.open { background: var(--accent); color: #fff; }

  /* SETS */
  .sets-container { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); background: var(--bg); }
  .sets-container.open { display: block; }
  .sets-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 6px; font-weight: 700; }
  .input-labels { display: grid; grid-template-columns: 28px 1fr 1fr 60px 36px; gap: 6px; margin-bottom: 4px; }
  .input-label { font-size: 10px; color: var(--muted); text-align: center; font-weight: 700; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 60px 36px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .set-num {
    font-size: 11px; color: var(--accent); font-weight: 800; text-align: center;
    background: var(--surface2); border-radius: 8px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .set-input {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    padding: 9px 6px; text-align: center; width: 100%; outline: none;
    transition: border-color .2s, box-shadow .2s; -webkit-appearance: none;
  }
  .set-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(155,135,212,0.15); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; font-weight: 600; }
  .set-done {
    width: 36px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .15s; flex-shrink: 0; font-family: 'Nunito', sans-serif;
  }
  .set-done.checked { background: var(--success); border-color: var(--success); color: #fff; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 22px; z-index: 100;
    box-shadow: 0 -4px 20px rgba(155,135,212,0.08);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 6px; background: none; border: none; color: var(--muted);
    font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* HISTORY */
  .hist-session {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .hist-session-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface2);
  }
  .hist-date { font-weight: 800; font-size: 14px; }
  .hist-meta { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 600; }
  .hist-day-badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; }
  .hist-exercise { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .hist-exercise:last-child { border-bottom: none; }
  .hist-ex-name { font-weight: 700; font-size: 13px; margin-bottom: 5px; }
  .hist-sets { display: flex; gap: 6px; flex-wrap: wrap; }
  .hist-set-chip { background: var(--surface2); border-radius: 8px; padding: 4px 10px; font-size: 11px; color: var(--muted); font-weight: 600; }
  .hist-set-chip span { color: var(--accent); }
  .no-history { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-history .nh-icon { font-size: 52px; margin-bottom: 12px; }
  .no-history p { font-weight: 700; font-size: 15px; }

  /* PROGRESS */
  .prog-select {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; padding: 12px 14px; margin-bottom: 14px; outline: none;
  }
  .prog-chart-area { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .prog-chart-title { font-size: 11px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  canvas#progChart { width: 100% !important; display: block; }
  .prog-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 700; }

  /* FAB */
  .save-fab {
    position: fixed; bottom: 82px; right: max(16px, calc(50% - 215px + 16px));
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 50px;
    padding: 14px 22px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    cursor: pointer; box-shadow: 0 4px 20px rgba(155,135,212,0.35);
    display: flex; align-items: center; gap: 8px; transition: transform .15s; z-index: 99;
  }
  .save-fab:active { transform: scale(0.95); }

  /* TOAST */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--success); color: #fff; border-radius: 30px;
    padding: 12px 24px; font-weight: 800; font-size: 14px;
    transition: transform .3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999;
    box-shadow: 0 4px 20px rgba(123,196,164,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  main::-webkit-scrollbar { width: 3px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }
  #workoutView { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .scroll-inner { overflow-y: auto; flex: 1; padding: 14px; padding-bottom: 110px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div>
        <div class="logo">Mesociclo <span>9</span></div>
        <div class="week-sub" id="headerSub">—</div>
      </div>
      <div class="week-badge" id="weekBadge">Sem. 1</div>
    </div>
    <div class="week-row">
      <button class="week-nav" onclick="shiftWeek(-1)">‹</button>
      <div class="week-scroll" id="weekScroll"></div>
      <button class="week-nav" onclick="shiftWeek(1)">›</button>
    </div>
  </header>

  <div id="workoutView" class="view active">
    <div class="day-tabs" id="dayTabs"></div>
    <main id="exerciseList"></main>
  </div>

  <div id="historyView" class="view">
    <div class="scroll-inner" id="historyContent"></div>
  </div>

  <div id="progressView" class="view">
    <div class="scroll-inner">
      <select class="prog-select" id="progExercise" onchange="renderProgress()"></select>
      <div class="prog-chart-area">
        <div class="prog-chart-title">Peso máximo por sesión (kg)</div>
        <canvas id="progChart" height="180"></canvas>
      </div>
      <div class="prog-stats" id="progStats"></div>
    </div>
  </div>

  <button class="save-fab" id="saveFab" onclick="saveSession()">💾 Guardar sesión</button>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="navWorkout" onclick="switchView('workout')"><span class="nav-icon">🏋️</span>Entreno</button>
    <button class="nav-btn" id="navHistory" onclick="switchView('history')"><span class="nav-icon">📋</span>Historial</button>
    <button class="nav-btn" id="navProgress" onclick="switchView('progress')"><span class="nav-icon">📈</span>Progreso</button>
  </nav>
  <div class="toast" id="toast"></div>
</div>

    3:["0-1","0-1","0-1","F",  "F",  "F"  ], // Curl femoral sentada
    4:["0-1","0-1","0-1","F",  "F",  "F"  ], // Abducción máquina
    5:["1-2","1-2","1-2","0-1","0-1","0-1"], // Hiperextensiones glúteo
    6:["1",  "1",  "1",  "1",  "1",  "1"  ], // Rueda abdominal
  },
};

// 24 semanas → 12 microciclos, 2 semanas por bloque
// Semana 1-2 → MC 0 (MC 1-2), Semana 3-4 → MC 1 (MC 3-4), etc.
const MC_LABELS = ["MC 1-2","MC 3-4","MC 5-6","MC 7-8","MC 9-10","MC 11-12"];
const TOTAL_WEEKS = 24;
const weekToMcIdx = w => Math.floor((w-1)/2); // 0-5
const weekLabel = w => (w%2===1) ? "1ª semana del bloque" : "2ª semana del bloque";

// ── STATE ────────────────────────────────────────────────────
let currentDay = 1;
let currentWeek = parseInt(localStorage.getItem('gym_week')||'1');
let sessionData = {};
let history = JSON.parse(localStorage.getItem('gym_history')||'[]');

const sKey = (d,w) => `d${d}_w${w}`;

// ── INIT ─────────────────────────────────────────────────────
function init() {
  // Week buttons
  const scroll = document.getElementById('weekScroll');
  for (let w=1; w<=TOTAL_WEEKS; w++) {
    const btn = document.createElement('button');
    btn.id = `wb${w}`;
    btn.className = 'week-btn';
    btn.textContent = w;
    btn.onclick = ()=>selectWeek(w);
    scroll.appendChild(btn);
  }
  // Day tabs
  const dt = document.getElementById('dayTabs');
  for (let d=1; d<=5; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    btn.textContent = 'Día '+d;
    btn.onclick = ()=>selectDay(d);
    dt.appendChild(btn);
  }
  // Progress select
  const pe = document.getElementById('progExercise');
  const all=[];
  for(let d=1;d<=5;d++) ROUTINE[d].forEach(e=>{if(!all.includes(e.name))all.push(e.name);});
  all.forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;pe.appendChild(o);});

  applyWeek(currentWeek);
  applyDay(currentDay);
  renderExercises();
}

function applyWeek(w) {
  currentWeek = w;
  localStorage.setItem('gym_week', w);
  const mcIdx = weekToMcIdx(w);
  document.querySelectorAll('.week-btn').forEach((b,bi)=>{
    const ww=bi+1;
    b.className='week-btn'+(ww===w?' active':(weekToMcIdx(ww)===mcIdx?' same-micro':''));
  });
  document.getElementById('weekBadge').textContent = 'Sem. '+w;
  document.getElementById('headerSub').textContent = MC_LABELS[mcIdx]+' · '+weekLabel(w);
  setTimeout(()=>{
    const btn=document.getElementById('wb'+w);
    if(btn) btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}

function applyDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach((b,bi)=>b.classList.toggle('active',bi+1===d));
}

function selectWeek(w) { applyWeek(w); renderExercises(); }
function selectDay(d) { applyDay(d); renderExercises(); }
function shiftWeek(delta) { selectWeek(Math.max(1,Math.min(TOTAL_WEEKS,currentWeek+delta))); }

// ── EXERCISES ────────────────────────────────────────────────
function getReps(day,ei) { return (DAY_REPS[day][ei]||["—","—","—","—","—","—"])[weekToMcIdx(currentWeek)]; }
function getRir(day,ei)  { return (DAY_RIR[day]&&DAY_RIR[day][ei] ? DAY_RIR[day][ei][weekToMcIdx(currentWeek)] : '—'); }

function getLastWeight(name) {
  for(let i=history.length-1;i>=0;i--){
    const ex=history[i].exercises?.find(e=>e.name===name);
    if(ex){const ws=ex.sets.filter(s=>s.weight).map(s=>parseFloat(s.weight));if(ws.length)return Math.max(...ws);}
  }
  return null;
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  list.innerHTML='';
  const key = sKey(currentDay,currentWeek);
  if(!sessionData[key]) sessionData[key]={};

  ROUTINE[currentDay].forEach((ex,ei)=>{
    if(!sessionData[key][ei])
      sessionData[key][ei]={sets:Array.from({length:ex.sets},()=>({reps:'',weight:'',rir:'',done:false}))};
    const exData=sessionData[key][ei];
    const reps=getReps(currentDay,ei);
    const rir=getRir(currentDay,ei);
    const lastW=getLastWeight(ex.name);
    const hasData=exData.sets.some(s=>s.weight||s.reps);

    const card=document.createElement('div');
    card.className='exercise-card'+(hasData?' has-data':'');
    card.innerHTML=`
      <div class="ex-header" onclick="toggleEx(${ei})">
        <div style="flex:1">
          <div class="ex-name">${ex.name}</div>
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
          <div class="ex-reps">3 series · ${reps} reps · RIR ${rir}</div>
          ${lastW?`<div class="ex-last">↑ Último máx: ${lastW} kg</div>`:''}
        </div>
        <div class="ex-chevron" id="chev${ei}">›</div>
      </div>
      <div class="sets-container" id="sets${ei}">
        <div class="sets-label">Registrar series</div>
        <div class="input-labels"><div class="input-label"></div><div class="input-label">Reps</div><div class="input-label">Kg</div><div class="input-label">RIR</div><div class="input-label">✓</div></div>
        ${exData.sets.map((s,si)=>`
          <div class="set-row">
            <div class="set-num">${si+1}</div>
            <input class="set-input" type="text" inputmode="numeric" placeholder="${reps}" value="${s.reps}" onchange="upd(${ei},${si},'reps',this.value)"/>
            <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${s.weight}" onchange="upd(${ei},${si},'weight',this.value)"/>
            <input class="set-input" type="number" inputmode="numeric" placeholder="${rir}" value="${s.rir}" onchange="upd(${ei},${si},'rir',this.value)"/>
            <button class="set-done${s.done?' checked':''}" onclick="toggleDone(${ei},${si},this)">${s.done?'✓':''}</button>
          </div>
        `).join('')}
      </div>`;
    list.appendChild(card);
  });
}

function toggleEx(ei) {
  const sets=document.getElementById('sets'+ei);
  const chev=document.getElementById('chev'+ei);
  const open=sets.classList.toggle('open');
  chev.classList.toggle('open',open);
  chev.textContent=open?'↓':'›';
}

function upd(ei,si,field,val) {
  const key=sKey(currentDay,currentWeek);
  sessionData[key][ei].sets[si][field]=val;
}

function toggleDone(ei,si,btn) {
  const key=sKey(currentDay,currentWeek);
  const done=!sessionData[key][ei].sets[si].done;
  sessionData[key][ei].sets[si].done=done;
  btn.classList.toggle('checked',done);
  btn.textContent=done?'✓':'';
}

// ── SAVE ─────────────────────────────────────────────────────
function saveSession() {
  const key=sKey(currentDay,currentWeek);
  const data=sessionData[key];
  if(!data){showToast('⚠️ Añade datos primero');return;}
  const exercises=ROUTINE[currentDay].map((ex,ei)=>({
    name:ex.name,
    sets:(data[ei]?data[ei].sets:[]).map(s=>({...s}))
  })).filter(ex=>ex.sets.some(s=>s.reps||s.weight));
  if(!exercises.length){showToast('⚠️ Añade datos antes de guardar');return;}
  const sess={
    id:Date.now(),
    date:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}),
    dateRaw:new Date().toISOString(),
    day:currentDay, week:currentWeek,
    microciclo:MC_LABELS[weekToMcIdx(currentWeek)],
    exercises
  };
  history.push(sess);
  localStorage.setItem('gym_history',JSON.stringify(history));
  showToast('✅ Sesión guardada');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── VIEWS ────────────────────────────────────────────────────
function switchView(view) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const fab=document.getElementById('saveFab');
  if(view==='workout'){
    document.getElementById('workoutView').classList.add('active');
    document.getElementById('navWorkout').classList.add('active');
    fab.style.display='flex';
  } else if(view==='history'){
    document.getElementById('historyView').classList.add('active');
    document.getElementById('navHistory').classList.add('active');
    fab.style.display='none'; renderHistory();
  } else {
    document.getElementById('progressView').classList.add('active');
    document.getElementById('navProgress').classList.add('active');
    fab.style.display='none'; renderProgress();
  }
}

// ── HISTORY ──────────────────────────────────────────────────
function renderHistory() {
  const c=document.getElementById('historyContent');
  if(!history.length){
    c.innerHTML=`<div class="no-history"><div class="nh-icon">📋</div><p>Aún no hay sesiones.<br>¡A entrenar! 💪</p></div>`;return;
  }
  c.innerHTML=[...history].reverse().map(sess=>`
    <div class="hist-session">
      <div class="hist-session-header">
        <div>
          <div class="hist-date">${sess.date}</div>
          <div class="hist-meta">Semana ${sess.week||'—'} · ${sess.microciclo}</div>
        </div>
        <div class="hist-day-badge">Día ${sess.day}</div>
      </div>
      ${sess.exercises.map(ex=>`
        <div class="hist-exercise">
          <div class="hist-ex-name">${ex.name}</div>
          <div class="hist-sets">${ex.sets.map((s,i)=>`
            <div class="hist-set-chip">S${i+1}: <span>${s.weight||'—'}kg</span> × ${s.reps||'—'} · RIR ${s.rir!==''&&s.rir!==undefined?s.rir:'—'}</div>
          `).join('')}</div>
        </div>`).join('')}
    </div>`).join('');
}

// ── PROGRESS ─────────────────────────────────────────────────
function renderProgress() {
  const exName=document.getElementById('progExercise').value;
  const sessions=history.filter(s=>s.exercises?.some(e=>e.name===exName));
  const labels=sessions.map(s=>`S${s.week||'?'}`);
  const weights=sessions.map(s=>{
    const ex=s.exercises.find(e=>e.name===exName);
    const ws=ex.sets.filter(st=>st.weight).map(st=>parseFloat(st.weight));
    return ws.length?Math.max(...ws):0;
  });

  const canvas=document.getElementById('progChart');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!sessions.length){
    const W2=canvas.offsetWidth||340; canvas.width=W2; canvas.height=100;
    ctx.fillStyle='#9a94b4'; ctx.font='13px Nunito'; ctx.textAlign='center';
    ctx.fillText('Sin datos para este ejercicio',W2/2,50);
    document.getElementById('progStats').innerHTML=`<div class="stat-box"><div class="stat-val">—</div><div class="stat-lbl">Máximo</div></div><div class="stat-box"><div class="stat-val">—</div><div class="stat-lbl">Último</div></div><div class="stat-box"><div class="stat-val">—</div><div class="stat-lbl">Sesiones</div></div>`;
    return;
  }

  const W=canvas.offsetWidth||340, H=180;
  canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(devicePixelRatio,devicePixelRatio);

  const pL=42,pR=14,pT=14,pB=36;
  const cW=W-pL-pR, cH=H-pT-pB;
  const minW=Math.max(0,Math.min(...weights)-5), maxW=Math.max(...weights)+5;
  const px=i=>pL+(i/Math.max(1,weights.length-1))*cW;
  const py=w=>pT+cH-((w-minW)/Math.max(1,maxW-minW))*cH;

  for(let g=0;g<=4;g++){
    const y=pT+(g/4)*cH;
    ctx.strokeStyle='#dcd7ee'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cW,y); ctx.stroke();
    ctx.fillStyle='#9a94b4'; ctx.font='10px Nunito'; ctx.textAlign='right';
    ctx.fillText((maxW-(g/4)*(maxW-minW)).toFixed(0)+'kg',pL-4,y+4);
  }

  ctx.beginPath(); ctx.moveTo(px(0),pT+cH);
  weights.forEach((w,i)=>ctx.lineTo(px(i),py(w)));
  ctx.lineTo(px(weights.length-1),pT+cH); ctx.closePath();
  const grad=ctx.createLinearGradient(0,pT,0,pT+cH);
  grad.addColorStop(0,'rgba(155,135,212,0.22)'); grad.addColorStop(1,'rgba(155,135,212,0)');
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  weights.forEach((w,i)=>i===0?ctx.moveTo(px(i),py(w)):ctx.lineTo(px(i),py(w)));
  ctx.strokeStyle='#9b87d4'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();

  weights.forEach((w,i)=>{
    ctx.beginPath(); ctx.arc(px(i),py(w),5,0,Math.PI*2); ctx.fillStyle='#9b87d4'; ctx.fill();
    ctx.beginPath(); ctx.arc(px(i),py(w),2.5,0,Math.PI*2); ctx.fillStyle='#faf9fd'; ctx.fill();
  });

  const step=Math.max(1,Math.ceil(labels.length/6));
  labels.forEach((l,i)=>{
    if(i%step!==0&&i!==labels.length-1)return;
    ctx.fillStyle='#9a94b4'; ctx.font='9px Nunito'; ctx.textAlign='center';
    ctx.fillText(l,px(i),H-8);
  });

  const maxKg=Math.max(...weights), lastKg=weights[weights.length-1];
  const diff=weights.length>1?(lastKg-weights[0]).toFixed(1):'—';
  document.getElementById('progStats').innerHTML=`
    <div class="stat-box"><div class="stat-val">${maxKg}</div><div class="stat-lbl">Máx kg</div></div>
    <div class="stat-box"><div class="stat-val">${lastKg}</div><div class="stat-lbl">Último</div></div>
    <div class="stat-box"><div class="stat-val">${diff==='—'?diff:(parseFloat(diff)>=0?'+':'')+diff}</div><div class="stat-lbl">Progreso</div></div>
  `;
}

init();
</script>
</body>
</html>
